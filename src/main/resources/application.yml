spring:
  application:
    name: expense-tracker-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:159753}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true

server:
  servlet:
    context-path: /api/v1

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-to-a-long-random-secret-before-running}
      access-token-expiration: 15m
      refresh-token-expiration: 30d
