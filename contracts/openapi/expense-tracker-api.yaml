openapi: 3.1.0
info:
  title: Expense Tracker API
  version: 1.0.0
  description: Contract for the Expense Tracker backend and Flutter mobile clients.
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.example.com
    description: Production
tags:
  - name: Authentication
  - name: Budget Groups
  - name: Budget Members
  - name: Categories
  - name: Transactions
  - name: Reports
security:
  - bearerAuth: []
paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate a user
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access and refresh tokens
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens refreshed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout and revoke refresh token
      operationId: logoutUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Logout completed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/budget-groups:
    get:
      tags:
        - Budget Groups
      summary: List budget groups for the current user
      operationId: listBudgetGroups
      responses:
        "200":
          description: Budget groups returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetGroupResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Budget Groups
      summary: Create a budget group
      operationId: createBudgetGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetGroupCreateRequest"
      responses:
        "201":
          description: Budget group created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetGroupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/budget-groups/{id}:
    parameters:
      - $ref: "#/components/parameters/BudgetGroupId"
    get:
      tags:
        - Budget Groups
      summary: Get budget group details
      operationId: getBudgetGroup
      responses:
        "200":
          description: Budget group returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetGroupDetailResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - Budget Groups
      summary: Update a budget group
      operationId: updateBudgetGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetGroupUpdateRequest"
      responses:
        "200":
          description: Budget group updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetGroupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - Budget Groups
      summary: Delete a budget group
      operationId: deleteBudgetGroup
      responses:
        "204":
          description: Budget group deleted successfully.
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/budget-groups/{id}/members:
    parameters:
      - $ref: "#/components/parameters/BudgetGroupId"
    get:
      tags:
        - Budget Members
      summary: List budget group members
      operationId: listBudgetMembers
      responses:
        "200":
          description: Budget group members returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetMemberResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Budget Members
      summary: Add a budget group member
      operationId: addBudgetMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetMemberCreateRequest"
      responses:
        "201":
          description: Budget group member added successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetMemberResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/budget-groups/{id}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/BudgetGroupId"
      - $ref: "#/components/parameters/MemberId"
    delete:
      tags:
        - Budget Members
      summary: Remove a budget group member
      operationId: removeBudgetMember
      responses:
        "204":
          description: Budget group member removed successfully.
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/categories:
    get:
      tags:
        - Categories
      summary: List categories
      operationId: listCategories
      parameters:
        - $ref: "#/components/parameters/BudgetGroupIdQuery"
        - $ref: "#/components/parameters/TransactionTypeQuery"
      responses:
        "200":
          description: Categories returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Categories
      summary: Create a category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
      responses:
        "201":
          description: Category created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/categories/{id}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    put:
      tags:
        - Categories
      summary: Update a category
      operationId: updateCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdateRequest"
      responses:
        "200":
          description: Category updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - Categories
      summary: Delete a category
      operationId: deleteCategory
      responses:
        "204":
          description: Category deleted successfully.
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/transactions:
    get:
      tags:
        - Transactions
      summary: List transactions
      operationId: listTransactions
      parameters:
        - $ref: "#/components/parameters/BudgetGroupIdQuery"
        - $ref: "#/components/parameters/CategoryIdQuery"
        - $ref: "#/components/parameters/TransactionTypeQuery"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/SizeQuery"
      responses:
        "200":
          description: Transactions returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionPageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Transactions
      summary: Create a transaction
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCreateRequest"
      responses:
        "201":
          description: Transaction created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/transactions/{id}:
    parameters:
      - $ref: "#/components/parameters/TransactionId"
    get:
      tags:
        - Transactions
      summary: Get transaction details
      operationId: getTransaction
      responses:
        "200":
          description: Transaction returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - Transactions
      summary: Update a transaction
      operationId: updateTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdateRequest"
      responses:
        "200":
          description: Transaction updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - Transactions
      summary: Delete a transaction
      operationId: deleteTransaction
      responses:
        "204":
          description: Transaction deleted successfully.
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/reports/summary:
    get:
      tags:
        - Reports
      summary: Get financial summary report
      operationId: getSummaryReport
      parameters:
        - $ref: "#/components/parameters/BudgetGroupIdQuery"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Summary report returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryReportResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/reports/categories:
    get:
      tags:
        - Reports
      summary: Get category statistics report
      operationId: getCategoryReport
      parameters:
        - $ref: "#/components/parameters/BudgetGroupIdQuery"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
        - $ref: "#/components/parameters/TransactionTypeQuery"
      responses:
        "200":
          description: Category report returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryReportItem"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/reports/members:
    get:
      tags:
        - Reports
      summary: Get member statistics report
      operationId: getMemberReport
      parameters:
        - $ref: "#/components/parameters/BudgetGroupIdQuery"
        - $ref: "#/components/parameters/StartDateQuery"
        - $ref: "#/components/parameters/EndDateQuery"
      responses:
        "200":
          description: Member report returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberReportItem"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/AuthorizationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BudgetGroupId:
      name: id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
      description: Budget group identifier.
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
      description: Budget member identifier.
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
      description: Category identifier.
    TransactionId:
      name: id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
      description: Transaction identifier.
    BudgetGroupIdQuery:
      name: budgetGroupId
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Uuid"
      description: Filter by budget group identifier.
    CategoryIdQuery:
      name: categoryId
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Uuid"
      description: Filter by category identifier.
    TransactionTypeQuery:
      name: type
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/TransactionType"
      description: Filter by transaction type.
    StartDateQuery:
      name: startDate
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/ApiDate"
      description: Inclusive report or search start date.
    EndDateQuery:
      name: endDate
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/ApiDate"
      description: Inclusive report or search end date.
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
      description: Zero-based page index.
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
      description: Page size.
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthenticationError:
      description: Authentication failed or token is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthorizationError:
      description: Authenticated user is not allowed to access this resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Request conflicts with an existing resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Uuid:
      type: string
      format: uuid
      examples:
        - 0191f4a5-7d0c-7d5b-9f5f-ec31ce70d1a1
    DateTime:
      type: string
      format: date-time
      examples:
        - "2026-06-21T12:00:00Z"
    ApiDate:
      type: string
      format: date
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      description: API date value in YYYY-MM-DD format. Flutter clients should collect this with a date picker and display it using the user's locale.
      examples:
        - "2026-06-21"
    MoneyAmount:
      type: number
      format: double
      minimum: 0
      multipleOf: 0.01
      examples:
        - 125.50
    CurrencyCode:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "^[A-Z]{3}$"
      examples:
        - USD
        - TRY
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 128
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
    AuthResponse:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
          minLength: 1
        refreshToken:
          type: string
          minLength: 1
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token lifetime in seconds.
        user:
          $ref: "#/components/schemas/UserResponse"
    TokenResponse:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          minLength: 1
        refreshToken:
          type: string
          minLength: 1
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: Access token lifetime in seconds.
    SuccessResponse:
      type: object
      additionalProperties: false
      required:
        - success
      properties:
        success:
          type: boolean
    UserResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - firstName
        - lastName
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        createdAt:
          $ref: "#/components/schemas/DateTime"
        updatedAt:
          $ref: "#/components/schemas/DateTime"
    BudgetGroupCreateRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - currency
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type:
            - string
            - "null"
          maxLength: 500
        currency:
          $ref: "#/components/schemas/CurrencyCode"
    BudgetGroupUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - currency
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type:
            - string
            - "null"
          maxLength: 500
        currency:
          $ref: "#/components/schemas/CurrencyCode"
    BudgetGroupResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - currency
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        description:
          type:
            - string
            - "null"
        currency:
          $ref: "#/components/schemas/CurrencyCode"
        ownerUserId:
          $ref: "#/components/schemas/Uuid"
        createdAt:
          $ref: "#/components/schemas/DateTime"
        updatedAt:
          $ref: "#/components/schemas/DateTime"
    BudgetGroupDetailResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - currency
        - ownerUserId
        - members
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        description:
          type:
            - string
            - "null"
        currency:
